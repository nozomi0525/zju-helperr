version: '3.8'
services:
  web:
    build: ./backend
    container_name: campus_help_web
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=1
    depends_on: []
  frontend:
    build: ./frontend
    container_name: campus_help_frontend
    ports:
      - "3000:80"
    depends_on:
      - web
