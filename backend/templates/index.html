<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>浙大校园互助</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
      body{font-family:Arial,Helvetica,sans-serif;padding:1rem}
      .card{border:1px solid #ddd;padding:1rem;margin-bottom:1rem}
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>浙大校园互助</h1>
        <div class="nav">
          <button @click="showTab='list'">帖子</button>
          <button @click="showTab='publish'">发布</button>
          <button @click="showTab='me'">我的</button>
          <span style="float:right">
            <template v-if="!user">
              <button @click="showLogin=true">登录</button>
              <button @click="showRegister=true">注册</button>
            </template>
            <template v-else>
              欢迎 {{user.username}} <button @click="logout">登出</button>
            </template>
          </span>
        </div>
      </header>

      <main>
        <section v-show="showTab==='list'">
          <div class="card">
            <h3>帖子</h3>
            <div>
              <label>分类：
                <select v-model="filter.category">
                  <option value="">全部</option>
                  <option value="carpool">拼车</option>
                  <option value="errand">跑腿</option>
                  <option value="agency">代办</option>
                  <option value="emergency">特需</option>
                </select>
              </label>
              <button @click="load">刷新</button>
            </div>
            <div v-for="t in tasks" :key="t.id" class="card">
              <div style="display:flex;justify-content:space-between">
                <div>
                  <strong @click="openTask(t)">{{t.title}}</strong>
                  <div>分类: {{t.category}} | 位置: {{t.location}} | 状态: {{t.status}}</div>
                </div>
                <div>
                  <button v-if="user" @click="accept(t)">接单</button>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section v-show="showTab==='publish'">
          <div class="card">
            <h3>发布任务</h3>
            <div>
              <label>分类：
                <select v-model="form.category">
                  <option value="carpool">拼车</option>
                  <option value="errand">跑腿</option>
                  <option value="agency">业务代办</option>
                  <option value="emergency">特需</option>
                </select>
              </label>
            </div>
            <div>
              <label>标题：<input v-model="form.title" /></label>
            </div>
            <div>
              <label>位置：<input v-model="form.location" /></label>
            </div>
            <div>
              <label>备注：<input v-model="form.remark" /></label>
            </div>
            <div>
              <button @click="publish">发布</button>
            </div>
          </div>
        </section>

        <section v-show="showTab==='me'">
          <div class="card">
            <h3>我的</h3>
            <div v-if="!user">请先登录查看个人信息</div>
            <div v-else>
              <div>用户名：{{user.username}}</div>
              <div>信用分：{{user.credit_score}}</div>
            </div>
          </div>
        </section>

      </main>

      <div v-if="showLogin" class="modal">
        <div class="modal-inner card">
          <h3>登录</h3>
          <div><label>用户名：<input v-model="auth.username" /></label></div>
          <div><label>密码：<input type="password" v-model="auth.password" /></label></div>
          <div><button @click="login">登录</button> <button @click="showLogin=false">取消</button></div>
        </div>
      </div>

      <div v-if="showRegister" class="modal">
        <div class="modal-inner card">
          <h3>注册</h3>
          <div><label>用户名：<input v-model="reg.username" /></label></div>
          <div><label>密码：<input type="password" v-model="reg.password" /></label></div>
          <div><button @click="register">注册</button> <button @click="showRegister=false">取消</button></div>
        </div>
      </div>

    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
